services:
  # ── Node.js API ─────────────────────────────────────────────────────────────
  - type: web
    name: skillsync-api
    runtime: node
    rootDir: backend/node-service
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # You will enter this manually in the Render dashboard
      - key: JWT_SECRET
        generateValue: true # Render auto-generates a secure random value
      - key: PYTHON_SERVICE_URL
        value: https://skillsync-python.onrender.com
      - key: FRONTEND_URL
        sync: false # You will enter your Vercel URL here after deploying frontend
    healthCheckPath: /health

  # ── Python NLP Service ───────────────────────────────────────────────────────
  - type: web
    name: skillsync-python
    runtime: python
    rootDir: backend/python-service
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_md
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_ENV
        value: production
    healthCheckPath: /health
